name: CopyNod
options:
  bundleIdPrefix: kr.ai.simpool
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0

targets:
  CopyNod:
    type: application
    platform: macOS
    sources:
      - CopyNod
    info:
      path: CopyNod/Info.plist
      properties:
        CFBundleDisplayName: CopyNod
        LSUIElement: true
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        # appcast 발행·EdDSA 서명은 M4 — 그 전까지 수동 확인은 서버 접근 실패가 정상
        SUFeedURL: https://kimtj12.github.io/copynod/appcast.xml
        SUEnableAutomaticChecks: true
        # EdDSA 공개 키 — 개인 키는 로그인 키체인의 "Private key for signing Sparkle updates"
        SUPublicEDKey: PuibY1eAngHFoB2zO5z6Bmg7h2w6rJG8BtUma0SlFU4=
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.ai.simpool.CopyNod
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: RC348YTD6U  # SIMPOOL Inc. — 배포 명의 (docs/release.md)
        DEVELOPMENT_LANGUAGE: en
        # notarization 요건 (scripts/release.sh)
        ENABLE_HARDENED_RUNTIME: YES

  CopyNodTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - CopyNodTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CopyNod

schemes:
  CopyNod:
    build:
      targets:
        CopyNod: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CopyNodTests
